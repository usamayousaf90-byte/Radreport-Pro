<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RadReport 5 Preview</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html,body,#root{height:100%;margin:0}
    #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font:14px/1.5 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#0b1220;color:#dbeafe}
    #err{position:fixed;left:16px;right:16px;top:16px;max-height:45vh;overflow:auto;padding:12px;border-radius:8px;background:#fee2e2;color:#7f1d1d;font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;white-space:pre-wrap;display:none;z-index:9999}
  </style>
</head>
<body>
  <div id="boot">Loading RadReport preview…</div>
  <pre id="err"></pre>
  <div id="root"></div>
  <script>
    (async function() {
      var boot = document.getElementById("boot");
      var errEl = document.getElementById("err");
      function fail(msg) {
        errEl.style.display = "block";
        errEl.textContent = String(msg || "Unknown error");
        boot.textContent = "Failed to load preview.";
      }
      window.addEventListener("error", function(e) {
        fail("Runtime error: " + (e.message || "unknown"));
      });
      window.addEventListener("unhandledrejection", function(e) {
        fail("Promise error: " + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
      });
      try {
        var src = await fetch("./RadReport_5.runtime.jsx", { cache: "no-store" }).then(function(r){ return r.text(); });
        var out = Babel.transform(src, { presets: ["react"] }).code;
        (new Function(out))();
        boot.remove();
      } catch (e) {
        fail((e && e.stack) || (e && e.message) || e);
      }
    })();
  </script>
</body>
</html>
